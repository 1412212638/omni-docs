              type: object
              properties:
                model:
                  type: string
                  title: Model Name
                  description: The name of the TTS model to use
                voice:
                  type: string
                  title: Voice ID
                  description: Specify the voice ID for generation
                input:
                  type: string
                  title: Input Text
                  description: The text content to be converted to speech
                response_format:
                  type: string
                  enum:
                    - text
                    - audio
                  title: Response Format
                  description: The format of the audio output, supports text or audio
                speed:
                  type: string
