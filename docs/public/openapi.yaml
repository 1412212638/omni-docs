openapi: 3.0.1
info:
  title: OmniRouters
  description: ''
  version: 1.0.0
tags:
  - name: Chat
  - name: Chat/OpenAI
  - name: Chat/Gemini
  - name: Chat/Claude
  - name: Videos
  - name: Videos/Omni-Create video
  - name: Videos/Omni-Create video/Kling
  - name: Videos/Wan2.6
  - name: Videos/Seedance
  - name: Videos/Agent-VOD
  - name: Images
  - name: Images/Omni-Create image
  - name: Images/Nano-Banana
  - name: Images/Nano-Banana-Pro
  - name: Images/Nano-Banana2
  - name: Images/Seedream
  - name: Music
  - name: Music/Suno
  - name: Embeddings
  - name: Audio
  - name: Audio/Seed-TTS
  - name: Audio/Gemini-TTS
paths:
  /v1/chat/completions:
    post:
      summary: OpenAI Chat
      deprecated: false
      description: ''
      tags:
        - Images/Nano-Banana-Pro
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer sk-xxxx
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  description: 模型名称
                  examples:
                    - gemini-3-pro-image-preview
                stream:
                  type: boolean
                  description: 是否启用流式输出
                  default: false
                messages:
                  type: array
                  description: 消息列表
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        description: 消息角色
                        enum:
                          - user
                          - assistant
                          - system
                      content:
                        type: string
                        description: 消息内容
                    required:
                      - role
                      - content
                extra_body:
                  type: object
                  description: 额外的请求体参数
                  properties:
                    google:
                      type: object
                      description: Google 特定配置
                      properties:
                        image_config:
                          type: object
                          description: 图像生成配置
                          properties:
                            aspect_ratio:
                              type: string
                              description: 图像宽高比
                              enum:
                                - '1:1'
                                - '3:4'
                                - '4:3'
                                - '9:16'
                                - '16:9'
                              default: '16:9'
                            image_size:
                              type: string
                              description: 图像尺寸
                              enum:
                                - 1K
                                - 2K
                                - 4K
                              default: 1K
              required:
                - model
                - messages
            example:
              model: gemini-3-pro-image-preview
              stream: false
              messages:
                - role: user
                  content: draw a cat
              extra_body:
                google:
                  image_config:
                    aspect_ratio: '16:9'
                    image_size: 1K
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
      security: []
  /v1/responses:
    post:
      summary: Responses
      deprecated: false
      description: >-
        OpenAI Responses API, used for creating model responses.

        Supports functions such as multi-round dialogues, tool invocation, and
        reasoning.
      tags:
        - Chat/OpenAI
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer sk-xxxx
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
              properties:
                model:
                  type: string
                  description: ID of the model to use, e.g. gpt-4o or gpt-3.5-turbo.
                  examples:
                    - gpt-4o
                    - gpt-4-turbo
                    - gpt-3.5-turbo
                messages:
                  type: array
                  description: A list of messages comprising the conversation.
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum:
                          - system
                          - user
                          - assistant
                          - tool
                          - function
                        description: The role of the message author.
                      content:
                        anyOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                text:
                                  type: string
                                image_url:
                                  type: object
                                  properties: {}
                        description: >-
                          The content of the message (supports text or
                          multimodal array).
                      name:
                        type: string
                        description: An optional name for the message author.
                      tool_calls:
                        type: array
                        description: >-
                          The tool calls generated by the model, such as
                          function calls.
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                            function:
                              type: object
                              properties: {}
                      tool_call_id:
                        type: string
                        description: The tool call ID that this message is responding to.
                temperature:
                  type: number
                  minimum: 0
                  maximum: 2
                  default: 1
                  description: >-
                    The sampling temperature to use, between 0 and 2. Higher
                    values like 0.8 will make the output more random, while
                    lower values like 0.2 will make it more focused and
                    deterministic.
                top_p:
                  type: number
                  default: 1
                  description: >-
                    An alternative to sampling with temperature, called nucleus
                    sampling, where the model considers the results of the
                    tokens with top_p probability mass. So 0.1 means only the
                    tokens comprising the top 10% probability mass are
                    considered.
                'n':
                  type: integer
                  default: 1
                  description: >-
                    How many chat completion choices to generate for each input
                    message.
                stream:
                  type: boolean
                  default: false
                  description: >-
                    If set, partial message deltas will be sent (similar to
                    ChatGPT).
                stop:
                  anyOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: >-
                    Up to 4 sequences where the API will stop generating further
                    tokens.
                max_tokens:
                  type: integer
                  description: >-
                    The maximum number of tokens to generate in the chat
                    completion.
                presence_penalty:
                  type: number
                  minimum: -2
                  maximum: 2
                  default: 0
                  description: >-
                    Number between -2.0 and 2.0. Positive values penalize new
                    tokens based on whether they appear in the text so far,
                    increasing the model's likelihood to talk about new topics.
                frequency_penalty:
                  type: number
                  minimum: -2
                  maximum: 2
                  default: 0
                  description: >-
                    Number between -2.0 and 2.0. Positive values penalize new
                    tokens based on their existing frequency in the text so far,
                    decreasing the model's likelihood to repeat the same line
                    verbatim.
                logit_bias:
                  type: object
                  description: >-
                    Modify the likelihood of specified tokens appearing in the
                    completion.
                  properties: {}
                user:
                  type: string
                  description: >-
                    A unique identifier representing your end-user, which can
                    help OpenAI to monitor and detect abuse.
                response_format:
                  type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - text
                        - json_object
                  description: >-
                    An object specifying the format that the model must output.
                    Setting to { "type": "json_object" } enables JSON mode.
                seed:
                  type: integer
                  description: >-
                    If specified, the system will make a best effort to sample
                    deterministically.
                tools:
                  type: array
                  description: >-
                    A list of tools the model may call. Currently, only
                    functions are supported as a tool.
                  items:
                    type: object
                    required:
                      - type
                      - function
                    properties:
                      type:
                        type: string
                        const: function
                      function:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                            description: The name of the function to be called.
                          description:
                            type: string
                            description: >-
                              A description of what the function does, used by
                              the model.
                          parameters:
                            type: object
                            description: >-
                              The parameters the function accepts, described as
                              a JSON Schema object.
                            properties: {}
                tool_choice:
                  anyOf:
                    - type: string
                      enum:
                        - none
                        - auto
                        - required
                    - type: object
                      properties:
                        type:
                          type: string
                          const: function
                        function:
                          type: object
                          properties:
                            name:
                              type: string
                  description: Controls which (if any) tool is called by the model.
                logprobs:
                  type: boolean
                  description: Whether to return log probabilities of the output tokens.
                top_logprobs:
                  type: integer
                  minimum: 0
                  maximum: 20
                  description: >-
                    An integer specifying the number of most likely tokens to
                    return at each token position (if logprobs is set to true).
            example:
              model: gpt-5.2
              input:
                - role: user
                  content: 你好
              instructions: 你是一个有用的助手。
              max_output_tokens: 1000
              temperature: 0.7
              top_p: 1
              stream: false
              tools:
                - type: function
                  name: get_weather
                  description: 获取天气信息
                  parameters:
                    type: object
                    properties:
                      location:
                        type: string
                    required:
                      - location
              tool_choice: auto
              parallel_tool_calls: true
              user: user-123
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
      security: []
  /v1beta/models/{model}:generateContent:
    post:
      summary: Gemini Vision
      deprecated: false
      description: >-
        Gemini image, PDF, audio, and video recognition requests

        ⚠️Note: Only supports uploading images, PDFs, audios, and videos via
        inlineData in base64 format, and does not support fileData.fileUri or
        the File API.
      tags:
        - Chat/Gemini
      parameters:
        - name: model
          in: path
          description: ''
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: ''
          required: false
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  description: >-
                    Gemini model name, e.g. gemini-2.0-flash, gemini-2.5-pro,
                    etc.
                  default: gemini-2.0-flash
                contents:
                  type: array
                  description: >-
                    Request content array containing multimodal messages sent by
                    the user
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        description: Message role, typically user or model
                        enum:
                          - user
                          - model
                        default: user
                      parts:
                        type: array
                        description: >-
                          Message content parts, supporting multiple types
                          including text, image, audio, video, PDF, etc.
                        items:
                          type: object
                          properties:
                            text:
                              type: string
                              description: >-
                                Text content, used to describe task instructions
                                or ask questions
                            inlineData:
                              type: object
                              description: >-
                                Inline data, used to directly pass binary
                                content such as images, audio, video, PDF, etc.
                              properties:
                                mimeType:
                                  type: string
                                  description: >-
                                    MIME type, e.g. image/png, image/jpeg,
                                    audio/mp3, audio/wav, video/mp4,
                                    application/pdf, etc.
                                data:
                                  type: string
                                  description: Base64 encoded file data
                              required:
                                - mimeType
                                - data
                            fileData:
                              type: object
                              description: >-
                                File reference data, used to reference files
                                uploaded via the File API (suitable for large
                                files)
                              properties:
                                mimeType:
                                  type: string
                                  description: MIME type of the file
                                fileUri:
                                  type: string
                                  description: >-
                                    URI address of the file, in the format of
                                    gs:// or URI returned by the File API
                              required:
                                - mimeType
                                - fileUri
                    required:
                      - role
                      - parts
                generationConfig:
                  type: object
                  description: Generation configuration parameters
                  properties:
                    temperature:
                      type: number
                      description: >-
                        Controls the randomness of the output, higher values are
                        more random, range 0.0-2.0
                      default: 1
                      minimum: 0
                      maximum: 2
                    topP:
                      type: number
                      description: >-
                        Top-P sampling parameter, controls the cumulative
                        probability threshold of candidate tokens
                      default: 0.95
                      minimum: 0
                      maximum: 1
                    topK:
                      type: integer
                      description: >-
                        Top-K sampling parameter, limits the number of candidate
                        tokens
                      default: 40
                      minimum: 1
                    maxOutputTokens:
                      type: integer
                      description: Maximum number of tokens for generated content
                      default: 8192
                      minimum: 1
                    responseMimeType:
                      type: string
                      description: >-
                        Specifies the MIME type of the response format, e.g.
                        text/plain or application/json
                      default: text/plain
                    responseSchema:
                      type: object
                      description: >-
                        When responseMimeType is application/json, specifies the
                        output JSON Schema
                      properties: {}
                systemInstruction:
                  type: object
                  description: >-
                    System instruction, used to set the behavior and role of the
                    model
                  properties:
                    parts:
                      type: array
                      description: System instruction content
                      items:
                        type: object
                        properties:
                          text:
                            type: string
                            description: System instruction text
                safetySettings:
                  type: array
                  description: Safety settings, controls the level of content filtering
                  items:
                    type: object
                    properties:
                      category:
                        type: string
                        description: Safety category
                        enum:
                          - HARM_CATEGORY_HARASSMENT
                          - HARM_CATEGORY_HATE_SPEECH
                          - HARM_CATEGORY_SEXUALLY_EXPLICIT
                          - HARM_CATEGORY_DANGEROUS_CONTENT
                      threshold:
                        type: string
                        description: Filtering threshold
                        enum:
                          - BLOCK_NONE
                          - BLOCK_ONLY_HIGH
                          - BLOCK_MEDIUM_AND_ABOVE
                          - BLOCK_LOW_AND_ABOVE
                    required:
                      - category
                      - threshold
              required:
                - model
                - contents
            examples: {}
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
      security: []
  /v1/messages:
    post:
      summary: Claude Messages
      deprecated: false
      description: |-
        Request in Anthropic Claude Messages API format.
        The request header needs to include anthropic-version.
      tags:
        - Chat/Claude
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer sk-xxxx
          schema:
            type: string
        - name: anthropic-version
          in: header
          description: ''
          required: false
          example: '2023-06-01'
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  description: >-
                    The model name to use, e.g. 'claude-3-5-sonnet-20240620' or
                    'claude-3-opus-20240229'.
                messages:
                  type: array
                  description: A list of messages that make up the conversation.
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                        description: The role of the message sender.
                      content:
                        description: >-
                          The message content, which can be a string or an array
                          of content blocks (for multimodal input).
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - text
                                    - image
                                    - tool_use
                                    - tool_result
                                text:
                                  type: string
                                source:
                                  type: object
                                  properties:
                                    type:
                                      type: string
                                      const: base64
                                    media_type:
                                      type: string
                                    data:
                                      type: string
                                id:
                                  type: string
                                name:
                                  type: string
                                input:
                                  type: object
                                  properties: {}
                                tool_use_id:
                                  type: string
                                content:
                                  description: Tool result content
                                  oneOf:
                                    - type: string
                                    - type: array
                    required:
                      - role
                      - content
                max_tokens:
                  type: integer
                  description: >-
                    The maximum number of tokens to generate before stopping.
                    Note that different Claude models may have different limits.
                metadata:
                  type: object
                  description: An object of metadata about the request.
                  properties:
                    user_id:
                      type: string
                      description: >-
                        An external identifier for associating requests (e.g.
                        user ID).
                stop_sequences:
                  type: array
                  description: >-
                    Custom text sequences that will cause the model to stop
                    generating when encountered.
                  items:
                    type: string
                stream:
                  type: boolean
                  description: Whether to incrementally stream the response.
                  default: false
                system:
                  type: string
                  description: System Prompt, used to set context, instructions, or roles.
                temperature:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: >-
                    Amount of randomness injected into the response. It is
                    recommended to only modify one of temperature and top_p.
                top_k:
                  type: integer
                  description: >-
                    Only sample from the top K options for each subsequent
                    token.
                top_p:
                  type: number
                  description: Nucleus sampling probability.
                tools:
                  type: array
                  description: A list of tool definitions the model may use.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: >-
                          The tool name, must match the regex
                          ^[a-zA-Z0-9_-]{1,64}$.
                      description:
                        type: string
                        description: A detailed description of the tool's purpose.
                      input_schema:
                        type: object
                        description: JSON Schema for the tool's parameters.
                        properties: {}
                    required:
                      - name
                      - input_schema
                tool_choice:
                  type: object
                  description: Controls how the model uses the provided tools.
                  properties:
                    type:
                      type: string
                      enum:
                        - auto
                        - any
                        - tool
                    name:
                      type: string
                      description: >-
                        When type is tool, specifies the name of the tool to
                        use.
                  required:
                    - type
              required:
                - model
                - messages
                - max_tokens
            example:
              model: claude-opus-4-6-thinking
              messages:
                - role: user
                  content: string
              max_tokens: 1
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
      security: []
