                          title: Enable Timestamp
                          description: Whether to return word-level timestamp information
                        emotion:
                          type: string
                          title: Emotion
                          description: >-
                            Specify the emotional style of the speech, such as
                            happy, sad, etc.
                        volume_ratio:
                          type: number
                          title: Volume Ratio
                          description: The volume multiplier ratio, default is 1.0
                        pitch_ratio:
                          type: number
                          title: Pitch Ratio
                          description: The pitch multiplier ratio, default is 1.0
                      required:
                        - enable_timestamp
                        - emotion
                        - volume_ratio
                        - pitch_ratio
                      title: Doubao TTS Configuration
                      description: >-
                        Configuration parameters specific to Doubao large model
                        TTS
                  required:
                    - doubao_tts
                  title: Metadata
                  description: Additional configuration information
              required:
                - model
                - voice
                - input
                - response_format
                - speed
            example:
              model: seed-tts-1.0
              voice: zh_male_lengkugege_emo_v2_mars_bigtts
              input: 我真的很生气！你怎么可以这样做？这太过分了！
              response_format: mp3
              speed: 1
              metadata:
