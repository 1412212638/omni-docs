                image:
                  type: array
                  items:
                    type: string
                  description: 参考图片URL列表
                  examples:
                    - - >-
                        https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_imagesToimages_1.png
                      - >-
                        https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_imagesToimages_2.png
                response_format:
                  type: string
                  description: 响应格式，如 url 或 b64_json
                  examples:
                    - url
                size:
                  type: string
                  description: 生成图片的尺寸
                  examples:
                    - 4K
                stream:
                  type: boolean
                  description: 是否启用流式返回
                  examples:
                    - true
