  /v1/videos/generations:
    post:
      summary: 1.5-Pro-Create Task
      deprecated: false
      description: ''
      tags:
        - Videos/Seedance
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer sk-xxxx
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  title: 模型名称
                  description: 指定要使用的模型 ID
                  examples:
                    - doubao-seedance-1-5-pro-251215
                prompt:
                  type: string
                  title: 提示词
                  description: 生成视频的文本描述
                  examples:
                    - 一只可爱的猫在弹钢琴
                image:
                  type: string
                  title: 参考图片
                  description: 可选，用于生成视频的参考图片
                metadata:
                  type: object
                  title: 参数配置
                  description: 视频生成的详细参数配置
                  properties:
                    resolution:
                      type: string
                      title: 分辨率
                      description: 视频分辨率，如 1280x720
                      examples:
                        - 1280x720
                    ratio:
                      type: string
                      title: 宽高比
                      description: 视频画面比例，如 16:9
                      examples:
                        - '16:9'
                    duration:
                      type: integer
                      title: 时长
                      description: 视频时长（秒）
                      examples:
                        - 5
                    seed:
                      type: integer
                      title: 随机种子
                      description: 生成种子，用于固定结果
                      examples:
                        - 12345
                    generate_audio:
                      type: boolean
                      title: 生成音频
                      description: 是否生成音频
                      examples:
                        - true
                    watermark:
                      type: boolean
                      title: 水印
                      description: 是否添加水印
                      examples:
                        - false
                  required:
                    - resolution
                    - ratio
                    - duration
                    - seed
                    - generate_audio
                    - watermark
              required:
                - model
                - prompt
                - metadata
            example:
              model: doubao-seedance-1-5-pro-251215
              prompt: 一只可爱的猫在弹钢琴
              image: https://example.com/reference.jpg
              metadata:
                resolution: 1280x720
                ratio: '16:9'
                duration: 5
                seed: 12345
                generate_audio: true
                watermark: false
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
      security: []
  /v1/images/generations:
